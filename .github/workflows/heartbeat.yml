name: Update heartbeat.json

permissions:
  contents: write          # allow pushes

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 min
  workflow_dispatch:

concurrency:
  group: heartbeat-json
  cancel-in-progress: false   # queue; don't cancel

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 4     # auto-kill if the job hangs >4 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false    # we'll inject our own remote URL

      - name: Configure git credentials
        run: |
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build heartbeat with random images
        run: |
          node - <<'SCRIPT'
          const fs = require('fs');
          const path = require('path');

          const decades = ['1960s','1970s','1980s','1990s','2000s','2010s','2020s'];

          // Pick one random element from an array
          function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
          }

          // Build an images object: one random URL per decade + one for "all"
          const images = {};
          const allPool = [];

          for (const decade of decades) {
            const jsonPath = path.join(decade, 'images.json');
            if (!fs.existsSync(jsonPath)) {
              console.warn(`[heartbeat] ${jsonPath} not found — skipping`);
              continue;
            }
            const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            const list = data.images || [];
            if (list.length === 0) {
              console.warn(`[heartbeat] ${decade}/images.json is empty — skipping`);
              continue;
            }
            images[decade] = pickRandom(list);
            allPool.push(...list);
          }

          // "all" picks from every decade's combined pool
          if (allPool.length > 0) {
            images['all'] = pickRandom(allPool);
          }

          const heartbeat = {
            timestamp: Date.now(),
            images: images
          };

          fs.writeFileSync('heartbeat.json', JSON.stringify(heartbeat));
          console.log('[heartbeat] heartbeat.json updated with image URLs');
          console.log(JSON.stringify(heartbeat, null, 2));
          SCRIPT

      - name: Commit & push
        run: |
          git add heartbeat.json
          git commit -m "chore: bump heartbeat 🫀" || echo "Nothing to commit"
          git pull --rebase origin main   # rebases if the branch advanced
          git push origin HEAD:main
